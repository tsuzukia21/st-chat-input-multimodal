name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v6
    
    - name: Install uv and set Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    
    - name: Install dependencies
      run: uv sync --locked
    
    - name: Run black (code formatting check)
      run: uv run black --check .
    
    - name: Run flake8 (linting)
      run: uv run flake8 .
    
    - name: Run mypy (type checking)
      run: uv run mypy st_chat_input_multimodal/
    
    - name: Run tests
      run: uv run pytest --cov=st_chat_input_multimodal --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      if: matrix.python-version == '3.10'
      with:
        files: ./coverage.xml

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: st_chat_input_multimodal/frontend/package-lock.json
    
    - name: Install frontend dependencies
      run: |
        cd st_chat_input_multimodal/frontend
        npm ci
    
    - name: TypeScript type checking
      run: |
        cd st_chat_input_multimodal/frontend
        npx tsc --noEmit
    
    - name: Build frontend
      run: |
        cd st_chat_input_multimodal/frontend
        npm run build

  build-package:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install uv and set Python
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.10'
        enable-cache: true
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: st_chat_input_multimodal/frontend/package-lock.json
    
    - name: Install frontend dependencies and build
      run: |
        cd st_chat_input_multimodal/frontend
        npm ci
        npm run build
    
    - name: Build Python package
      run: uv build --no-sources
    
    - name: Check package
      run: uvx twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist/
